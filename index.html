<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>E-Commerce Home</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">.



  <style>
    body {
      font-family: Arial, sans-serif;
    }

    /* Navbar Custom */
    .navbar {
      background-color: #222;
    }

    .navbar-brand, .nav-link {
      color: #fff !important;
    }

    .nav-link:hover {
      color: #f8c146 !important;
    }

    /* Hero Section */
    #hero {
      background: url('https://via.placeholder.com/1200x400') center/cover no-repeat;
      color: white;
      padding: 120px 20px;
      text-align: center;
    }

    #hero h1 {
      font-size: 3rem;
      font-weight: bold;
    }

    #hero p {
      font-size: 1.2rem;
    }

    /* Cards */
    .card {
      border: none;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      border-radius: 10px;
    }

    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 8px 20px rgba(0,0,0,0.15);
    }

    .btn-custom {
      background-color: #222;
      color: white;
      border-radius: 20px;
    }

    .btn-custom:hover {
      background-color: #f8c146;
      color: black;
    }

    /* Footer */
    .footer {
      background: #222;
      color: white;
      padding: 20px 0;
      text-align: center;
      margin-top: 50px;
    }
  </style>
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg">
    <div class="container">
      <a class="navbar-brand fw-bold" href="#">MyShop</a>
      <button class="navbar-toggler bg-light" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
        ☰
      </button>

      <div class="collapse navbar-collapse justify-content-end" id="navMenu">
        <ul class="navbar-nav">
          <li class="nav-item"><a class="nav-link" href="#">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="#">Products</a></li>
          <li class="nav-item"><a class="nav-link" href="#">Cart</a></li>
          <li class="nav-item"><a class="nav-link" href="#">Contact</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- Hero -->
  <section id="hero">
    <div class="container">
      <h1>Welcome to MyShop</h1>
      <p>Best products at the best prices</p>
      <a href="#" class="btn btn-warning mt-3 px-4">Shop Now</a>
    </div>
  </section>

  <!-- Heading -->
  <section class="py-5 text-center">
    <div class="container">
      <h2 class="fw-bold">Featured Products</h2>
      <p class="text-muted">Check out our latest items</p>
    </div>
  </section>

  <!-- Products -->
  <section class="pb-5">
    <div class="container">
      <div class="row g-4">

        <!-- Card 1 -->
        <div class="col-12 col-sm-6 col-md-4">
          <div class="card p-3">
            <img src="https://via.placeholder.com/200" class="card-img-top" alt="Product">
            <div class="card-body text-center">
              <h5 class="card-title">Product 1</h5>
              <p class="card-text">₱100</p>
              <button class="btn btn-custom w-100 w-md-auto px-4 py-2">Add to Cart</button>
            </div>
          </div>
        </div>

        <!-- Card 2 -->
        <div class="col-12 col-sm-6 col-md-4">
          <div class="card p-3">
            <img src="https://via.placeholder.com/200" class="card-img-top" alt="Product">
            <div class="card-body text-center">
              <h5 class="card-title">Product 2</h5>
              <p class="card-text">₱250</p>
              <button class="btn btn-custom w-100 w-md-auto px-4 py-2">Add to Cart</button>
            </div>
          </div>
        </div>

        <!-- Card 3 -->
        <div class="col-12 col-sm-6 col-md-4">
          <div class="card p-3">
            <img src="https://via.placeholder.com/200" class="card-img-top" alt="Product">
            <div class="card-body text-center">
              <h5 class="card-title">Product 3</h5>
              <p class="card-text">₱300</p>
              <button class="btn btn-custom w-100 w-md-auto px-4 py-2">Add to Cart</button>
            </div>
          </div>
        </div>

      </div>
    </div>
  </section>

  <!-- Footer -->
  <footer class="footer">
    <p>&copy; 2026 MyShop. All rights reserved.</p>
  </footer>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
